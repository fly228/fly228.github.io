<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>AmaGame</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
	width: 100%;
	height: 100%;
}

body {
	color: white;
	background:
		radial-gradient(circle at top, rgba(255, 208, 92, 0.12), transparent 42%),
		linear-gradient(180deg, #18130f 0%, #0d0d0d 100%);
	overflow: hidden;
	touch-action: none;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
}

#canvas {
	display: block;
	width: 100%;
	height: 100%;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background:
		radial-gradient(circle at top, rgba(255, 197, 87, 0.16), transparent 36%),
		linear-gradient(180deg, #1c1712 0%, #0d0d0d 100%);
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	display: none;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	position: static;
	display: block;
	width: min(72vw, 260px);
	height: 12px;
	margin: 2px 0 0;
	appearance: none;
	border: 3px solid #2f2418;
	border-radius: 999px;
	background: rgba(0, 0, 0, 0.28);
	overflow: hidden;
	box-shadow: 0 4px 16px rgba(0, 0, 0, 0.24);
}

#status-progress::-webkit-progress-bar {
	background: rgba(0, 0, 0, 0.28);
}

#status-progress::-webkit-progress-value {
	background: linear-gradient(90deg, #ffcf62 0%, #ff944d 100%);
}

#status-progress::-moz-progress-bar {
	background: linear-gradient(90deg, #ffcf62 0%, #ff944d 100%);
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

#status-loading {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 16px;
	width: min(84vw, 320px);
	padding: 26px 24px 22px;
	border-radius: 28px;
	background: rgba(20, 16, 12, 0.78);
	box-shadow: 0 18px 60px rgba(0, 0, 0, 0.24);
	backdrop-filter: blur(8px);
}

#loading-stage {
	position: relative;
	width: 168px;
	height: 168px;
	border-radius: 24px;
	background:
		radial-gradient(circle at top, rgba(255, 215, 138, 0.35), transparent 40%),
		linear-gradient(180deg, #f8e8c8 0%, #e7d2b4 100%);
	box-shadow: inset 0 -8px 0 rgba(77, 58, 34, 0.12);
	overflow: hidden;
}

#loading-stage::after {
	content: "";
	position: absolute;
	left: 50%;
	bottom: 14px;
	width: 86px;
	height: 22px;
	transform: translateX(-50%);
	border-radius: 50%;
	background: rgba(65, 48, 33, 0.18);
	filter: blur(3px);
}

.loading-part {
	position: absolute;
	inset: 0;
	width: 100%;
	height: 100%;
	object-fit: contain;
	image-rendering: pixelated;
}

#loading-bag {
	position: absolute;
	right: 10px;
	bottom: 2px;
	width: 58px;
	height: auto;
	image-rendering: pixelated;
	transform: rotate(-7deg);
	filter: drop-shadow(0 5px 0 rgba(0, 0, 0, 0.14));
}

#loading-copy {
	display: flex;
	flex-direction: column;
	align-items: center;
	gap: 8px;
	text-align: center;
}

#loading-title {
	font-size: 30px;
	font-weight: 800;
	letter-spacing: 0.02em;
	color: #fff7eb;
}

#loading-subtitle {
	font-size: 16px;
	line-height: 1.35;
	color: rgba(255, 244, 225, 0.82);
}

#loading-roll {
	font-size: 13px;
	letter-spacing: 0.08em;
	text-transform: uppercase;
	color: #ffcf62;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="amagame-favicon-v2.png" />
<link rel="apple-touch-icon" sizes="180x180" href="amagame-home-180-v2.png"/>
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="amagame-home-180-v2.png"/>
<link rel="manifest" href="index.manifest-v2.json">
<meta name="theme-color" content="#111111"><style>input,textarea{font-size:16px!important;}</style>
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--false fullsize--true use-filter--true" src="index.png" alt="">
			<div id="status-loading">
				<div id="loading-stage" aria-hidden="true">
					<img id="loading-legs" class="loading-part" src="loading-assets/legs_01_idle.png" alt="">
					<img id="loading-body" class="loading-part" src="loading-assets/body_01_idle.png" alt="">
					<img id="loading-head" class="loading-part" src="loading-assets/head_01_open.png" alt="">
					<img id="loading-bag" src="loading-assets/garbage_bag.png" alt="">
				</div>
				<div id="loading-copy">
					<div id="loading-title">AmaGame</div>
					<div id="loading-subtitle">阿罵提著垃圾袋趕來中...</div>
					<div id="loading-roll">Loading Ama...</div>
				</div>
			</div>
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":true,"fileSizes":{"index.pck":27447380,"index.wasm":37685705},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const loadingHead = document.getElementById('loading-head');
	const loadingBody = document.getElementById('loading-body');
	const loadingLegs = document.getElementById('loading-legs');
	const loadingRoll = document.getElementById('loading-roll');

	let initializing = true;
	let statusMode = '';
	let loadingBlinkInterval = null;
	let loadingComboInterval = null;
	let currentHeadIndex = 1;
	let headEyesOpen = true;

	const LOADING_HEAD_OPTIONS = [1, 2, 3, 4, 5];
	const LOADING_BODY_OPTIONS = [1, 2, 3, 4, 5];
	const LOADING_LEG_OPTIONS = [1, 2, 3, 4];
	const LOADING_TAGLINES = [
		'Loading Ama...',
		'阿罵套裝抽卡中...',
		'本局角色生成中...',
		'垃圾袋已就位...',
		'阿罵暖身中...',
	];

	function pad2(num) {
		return String(num).padStart(2, '0');
	}

	function pickRandom(list) {
		return list[Math.floor(Math.random() * list.length)];
	}

	function refreshLoadingHead() {
		const suffix = headEyesOpen ? 'open' : 'close';
		loadingHead.src = `loading-assets/head_${pad2(currentHeadIndex)}_${suffix}.png`;
	}

	function randomizeLoadingAma() {
		currentHeadIndex = pickRandom(LOADING_HEAD_OPTIONS);
		const bodyIndex = pickRandom(LOADING_BODY_OPTIONS);
		const legsIndex = pickRandom(LOADING_LEG_OPTIONS);
		headEyesOpen = true;
		refreshLoadingHead();
		loadingBody.src = `loading-assets/body_${pad2(bodyIndex)}_idle.png`;
		loadingLegs.src = `loading-assets/legs_${pad2(legsIndex)}_idle.png`;
		loadingRoll.textContent = pickRandom(LOADING_TAGLINES);
	}

	function stopLoadingAnimation() {
		if (loadingBlinkInterval !== null) {
			clearInterval(loadingBlinkInterval);
			loadingBlinkInterval = null;
		}
		if (loadingComboInterval !== null) {
			clearInterval(loadingComboInterval);
			loadingComboInterval = null;
		}
	}

	function startLoadingAnimation() {
		randomizeLoadingAma();
		stopLoadingAnimation();
		loadingBlinkInterval = window.setInterval(() => {
			headEyesOpen = !headEyesOpen;
			refreshLoadingHead();
		}, 360);
		loadingComboInterval = window.setInterval(() => {
			randomizeLoadingAma();
		}, 1200);
	}

	startLoadingAnimation();

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			stopLoadingAnimation();
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		stopLoadingAnimation();
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
